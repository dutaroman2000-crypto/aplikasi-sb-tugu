<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SB TUGU FINAL FIREBASE</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{background:#edf4ff;color:#1e293b}
.login-page{height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#2563eb,#1d4ed8);padding:20px}
.login-box{background:white;width:100%;max-width:430px;padding:35px;border-radius:28px;box-shadow:0 20px 50px rgba(0,0,0,.2)}
.logo{font-size:34px;font-weight:700;color:#2563eb;margin-bottom:8px}
.subtitle{color:#64748b;margin-bottom:20px}
input,select{width:100%;padding:14px;border:1px solid #cbd5e1;border-radius:14px;margin-top:12px;font-size:14px}
button{cursor:pointer}
.login-btn,.save-btn{width:100%;padding:14px;border:none;border-radius:14px;background:#2563eb;color:white;font-weight:700;margin-top:12px}
#mainApp{display:none;padding:18px}
.topbar{display:flex;justify-content:flex-end;margin-bottom:16px}
.saldo-box{background:white;padding:18px 24px;border-radius:22px;box-shadow:0 3px 10px rgba(0,0,0,.05);text-align:right}
.saldo-box small{color:#64748b}
.saldo-box h2{color:#16a34a;font-size:30px;margin-top:6px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:16px}
.card{background:white;padding:18px;border-radius:22px;box-shadow:0 3px 10px rgba(0,0,0,.05)}
.card small{color:#64748b}
.card h2{margin-top:8px;color:#2563eb}
.section{background:white;padding:20px;border-radius:24px;margin-bottom:16px;box-shadow:0 3px 10px rgba(0,0,0,.05)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px}
.formbox{background:#f8fbff;padding:18px;border-radius:20px;border:1px solid #dbeafe}
.formbox h3{margin-bottom:12px;color:#2563eb}
table{width:100%;border-collapse:collapse}
th,td{padding:12px;border-bottom:1px solid #e2e8f0;font-size:13px;text-align:left}
th{background:#eff6ff;color:#2563eb}
.action-btn{padding:6px 10px;border:none;border-radius:8px;color:white;font-size:12px}
.edit-btn{background:#f59e0b}
.delete-btn{background:#ef4444}
.hidden{display:none}
</style>
</head>
<body>

<div class="login-page" id="loginPage">
<div class="login-box">
<div class="logo">SB TUGU</div>
<div class="subtitle">Kasir Professional Firebase</div>
<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">
<button class="login-btn" onclick="login()">LOGIN</button>
</div>
</div>

<div id="mainApp">

<div style="margin-bottom:15px;font-size:20px;font-weight:700;color:#2563eb" id="infoKasir"></div>

<div class="topbar">
<button onclick="logout()" style="background:#ef4444;color:white;border:none;padding:12px 18px;border-radius:12px;font-weight:700;margin-right:12px;cursor:pointer;">Logout</button>
<div class="saldo-box">
<small>Saldo Uang Tunai</small>
<h2 id="saldo">Rp 0</h2>
</html>
