<!DOCTYPE html>
<html>
<head>

<title>APLIKASI SB TUGU</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#ff9800">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}

let saldo =
  parseInt(localStorage.getItem("saldo")) || 0;

let totalQris =
  parseInt(localStorage.getItem("totalQris")) || 0;

let transaksi =
  JSON.parse(localStorage.getItem("transaksi")) || [];

function simpanData() {

  localStorage.setItem("saldo", saldo);

  localStorage.setItem("totalQris", totalQris);

  localStorage.setItem(
    "transaksi",
    JSON.stringify(transaksi)
  );

}

function tampilkanLaporan() {

  let isi = "";

  transaksi.forEach(function(item) {

    isi +=
      "<tr>" +
      "<td>" + item.waktu + "</td>" +
      "<td>" + item.jenis + "</td>" +
      "<td>" + item.uraian + "</td>" +
      "<td>Rp " + item.nominal + "</td>" +
      "</tr>";

  });

  document.getElementById("isiLaporan").innerHTML =
    isi;

}

function login() {

  var username =
    document.getElementById("username").value;

  var password =
    document.getElementById("password").value;

  if (
    (username === "owner" && password === "12345") ||
    (username === "kasir1" && password === "12345") ||
    (username === "kasir2" && password === "12345") ||
    (username === "kasir3" && password === "12345") ||
    (username === "kasir4" && password === "12345")
  ) {

    document.getElementById("loginPage").style.display =
      "none";

    document.getElementById("dashboard").style.display =
      "block";

    document.getElementById("saldo").innerHTML =
      saldo;

    document.getElementById("totalQris").innerHTML =
      totalQris;

    tampilkanLaporan();

    if (username === "owner") {

      document.getElementById("menuOwner").style.display =
        "block";

      document.getElementById("laporanOwner").style.display =
        "block";

    } else {

      document.getElementById("menuOwner").style.display =
        "none";

      document.getElementById("laporanOwner").style.display =
        "none";

    }

  } else {

    alert("Username atau Password salah");

  }

}

function logout() {

  document.getElementById("dashboard").style.display =
    "none";

  document.getElementById("loginPage").style.display =
    "block";

}

function waktuSekarang() {

  const sekarang = new Date();

  return sekarang.toLocaleString("id-ID");

}

function tambahKasMasuk() {

  var nominal =
    parseInt(document.getElementById("masuk").value) || 0;

  var uraian =
    document.getElementById("uraianMasuk").value;

  saldo += nominal;

  transaksi.push({
    waktu: waktuSekarang(),
    jenis: "Kas Masuk",
    uraian: uraian,
    nominal: nominal
  });

  document.getElementById("saldo").innerHTML =
    saldo;

  simpanData();

  tampilkanLaporan();

  alert("Kas Masuk berhasil");

  document.getElementById("masuk").value = "";

  document.getElementById("uraianMasuk").value = "";

}

function tambahKasKeluar() {

  var nominal =
    parseInt(document.getElementById("keluar").value) || 0;

  var uraian =
    document.getElementById("uraianKeluar").value;

  saldo -= nominal;

  transaksi.push({
    waktu: waktuSekarang(),
    jenis: "Kas Keluar",
    uraian: uraian,
    nominal: nominal
  });

  document.getElementById("saldo").innerHTML =
    saldo;

  simpanData();

  tampilkanLaporan();

  alert("Kas Keluar berhasil");

  document.getElementById("keluar").value = "";

  document.getElementById("uraianKeluar").value = "";

}

function tambahQris() {

  var qris =
    parseInt(document.getElementById("qris").value) || 0;

  totalQris += qris;

  transaksi.push({
    waktu: waktuSekarang(),
    jenis: "QRIS",
    uraian: "Pembayaran QRIS",
    nominal: qris
  });

  document.getElementById("totalQris").innerHTML =
    totalQris;

  simpanData();

  tampilkanLaporan();

  alert("QRIS berhasil disimpan");

  document.getElementById("qris").value = "";

}

function resetSaldo() {

  if (confirm("Yakin reset semua data?")) {

    saldo = 0;

    totalQris = 0;

    transaksi = [];

    simpanData();

    tampilkanLaporan();

    document.getElementById("saldo").innerHTML =
      saldo;

    document.getElementById("totalQris").innerHTML =
      totalQris;

    alert("Semua data berhasil direset");

  }

}

function updateJam() {

  const sekarang = new Date();

  const hari = [
    "Minggu",
    "Senin",
    "Selasa",
    "Rabu",
    "Kamis",
    "Jumat",
    "Sabtu"
  ];

  const namaHari =
    hari[sekarang.getDay()];

  const tanggal =
    sekarang.toLocaleDateString("id-ID");

  const jam =
    sekarang.toLocaleTimeString("id-ID");

  document.getElementById("jamOtomatis").innerHTML =
    namaHari + ", " +
    tanggal + " - " +
    jam;

}

setInterval(updateJam, 1000);

</script>

</head>

<body style="
font-family:Arial;
background:#fff3e0;
padding:20px;
">

<div id="loginPage">

<h1 style="color:orange;">
APLIKASI SB TUGU
</h1>

<h2>Kas Warteg Online</h2>

<input id="username"
placeholder="Username"
style="
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
">

<input id="password"
type="password"
placeholder="Password"
style="
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
">

<button onclick="login()"
style="
margin-top:20px;
padding:12px 24px;
background:orange;
color:white;
border:none;
border-radius:10px;
font-size:16px;
width:100%;
">
LOGIN
</button>

</div>

<div id="dashboard" style="display:none;">

<h2 style="color:orange;">
DASHBOARD SB TUGU
</h2>

<p id="jamOtomatis"
style="
font-weight:bold;
color:#555;
">
</p>

<h3>
Saldo Tunai:
Rp <span id="saldo">0</span>
</h3>

<h3>
Total QRIS:
Rp <span id="totalQris">0</span>
</h3>

<hr>

<h3>Tambah Kas Masuk</h3>

<input id="uraianMasuk"
placeholder="Uraian Kas Masuk"
style="
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
margin-bottom:10px;
">

<input id="masuk"
type="number"
placeholder="Nominal Kas Masuk"
style="
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
">

<button onclick="tambahKasMasuk()"
style="
margin-top:10px;
padding:12px;
width:100%;
background:green;
color:white;
border:none;
border-radius:10px;
">
Tambah Kas Masuk
</button>

<hr>

<h3>Tambah Kas Keluar</h3>

<input id="uraianKeluar"
placeholder="Uraian Kas Keluar"
style="
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
margin-bottom:10px;
">

<input id="keluar"
type="number"
placeholder="Nominal Kas Keluar"
style="
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
">

<button onclick="tambahKasKeluar()"
style="
margin-top:10px;
padding:12px;
width:100%;
background:red;
color:white;
border:none;
border-radius:10px;
">
Tambah Kas Keluar
</button>

<hr>

<h3>Tambah QRIS</h3>

<input id="qris"
type="number"
placeholder="Nominal QRIS"
style="
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
">

<button onclick="tambahQris()"
style="
margin-top:10px;
padding:12px;
width:100%;
background:blue;
color:white;
border:none;
border-radius:10px;
">
Tambah QRIS
</button>

<div id="menuOwner" style="display:none;">

<hr>

<h3>MENU OWNER / ADMIN</h3>

<button onclick="resetSaldo()"
style="
margin-top:10px;
padding:12px;
width:100%;
background:black;
color:white;
border:none;
border-radius:10px;
">
Reset Semua Data
</button>

</div>

<div id="laporanOwner" style="display:none;">

<hr>

<h3>LAPORAN TRANSAKSI</h3>

<table border="1"
width="100%"
style="
border-collapse:collapse;
background:white;
">

<tr style="background:orange;color:white;">
<th>Waktu</th>
<th>Jenis</th>
<th>Uraian</th>
<th>Nominal</th>
</tr>

<tbody id="isiLaporan"></tbody>

</table>

</div>

<button onclick="logout()"
style="
margin-top:20px;
padding:12px;
width:100%;
background:gray;
color:white;
border:none;
border-radius:10px;
">
Kembali ke Home
</button>

</div>

</body>
</html>
