<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SB TUGU</title>
<style>
body{
font-family:Arial,sans-serif;
margin:0;
background:#edf4ff;
}
.login{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#2563eb;
}
.box{
background:white;
padding:30px;
border-radius:20px;
width:90%;
max-width:420px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}
h1{
margin:0 0 10px;
color:#2563eb;
}
input{
width:100%;
padding:14px;
margin-top:10px;
border:1px solid #ccc;
border-radius:12px;
box-sizing:border-box;
font-size:15px;
}
button{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
font-weight:bold;
font-size:15px;
cursor:pointer;
}
#app{
display:none;
padding:15px;
}
.top{
background:white;
padding:18px;
border-radius:18px;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:10px;
margin-bottom:15px;
}
.card{
background:white;
padding:18px;
border-radius:18px;
}
.card small{
color:#666;
}
.card h2{
margin:8px 0 0;
font-size:22px;
color:#2563eb;
}
.section{
background:white;
padding:18px;
border-radius:18px;
margin-bottom:15px;
}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:12px;
}
.formbox{
background:#f8fbff;
padding:15px;
border-radius:15px;
border:1px solid #dbeafe;
}
.formbox h3{
margin:0 0 10px;
color:#2563eb;
}
table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}
th,td{
padding:10px;
border-bottom:1px solid #ddd;
font-size:13px;
text-align:left;
}
th{
background:#eff6ff;
color:#2563eb;
}
</style>
</head>
<body>
<div class="login" id="loginPage">
<div class="box">
<h1>SB TUGU</h1>
<p>Aplikasi Kasir Realtime</p>
<input type="text" id="username" placeholder="Username" autocomplete="username">
<input type="password" id="password" placeholder="Password" autocomplete="current-password">
<button onclick="login()">LOGIN</button>
</div>
</div>
<div id="app">
<div class="top">
<div>
<h2>Dashboard SB TUGU</h2>
<div id="welcome"></div>
</div>
<div>
<h3>Saldo Tunai</h3>
<h2 id="saldo">Rp 0</h2>
</div>
</div>
<div class="cards">
<div class="card"><small>Total Tunai</small><h2 id="tunai">Rp 0</h2></div>
<div class="card"><small>Total QRIS</small><h2 id="qris">Rp 0</h2></div>
<div class="card"><small>Pengeluaran</small><h2 id="pengeluaran">Rp 0</h2></div>
<div class="card"><small>Tabungan</small><h2 id="tabungan">Rp 0</h2></div>
</div>
<div class="section">
<h2>Input Transaksi</h2>
<div class="grid">
<div class="formbox">
<h3>Penjualan Tunai</h3>
<input id="tunaiNominal" placeholder="Nominal">
<input id="tunaiUraian" placeholder="Uraian">
<button onclick="simpan('Tunai')">Simpan</button>
</div>
<div class="formbox">
<h3>Penjualan QRIS</h3>
<input id="qrisNominal" placeholder="Nominal">
<input id="qrisUraian" placeholder="Uraian">
<button onclick="simpan('QRIS')">Simpan</button>
</div>
<div class="formbox">
<h3>Pengeluaran Umum</h3>
<input id="pengeluaranNominal" placeholder="Nominal">
<input id="pengeluaranUraian" placeholder="Uraian">
<button onclick="simpan('Pengeluaran')">Simpan</button>
</div>
<div class="formbox">
<h3>Pengeluaran Tabungan</h3>
<input id="tabunganNominal" placeholder="Nominal">
<input id="tabunganUraian" placeholder="Uraian">
<button onclick="simpan('Tabungan')">Simpan</button>
</div>
</div>
</div>
<div class="section">
<h2>History Transaksi</h2>
<table>
<thead>
<tr>
<th>Waktu</th>
<th>Jenis</th>
<th>Uraian</th>
<th>Nominal</th>
</tr>
</thead>
<tbody id="history"></tbody>
</table>
</div>
</div>
<script>
let transaksi=[];

function rupiah(n){
return Number(n).toLocaleString('id-ID');
}

function login(){
const u=document.getElementById('username').value;
const p=document.getElementById('password').value;

if(p==='12345'){
document.getElementById('loginPage').style.display='none';
document.getElementById('app').style.display='block';
document.getElementById('welcome').innerHTML='Login sebagai '+u;
}else{
alert('Password salah');
}
}

function simpan(jenis){
let nominal=0;
let uraian='';

if(jenis==='Tunai'){
nominal=document.getElementById('tunaiNominal').value;
uraian=document.getElementById('tunaiUraian').value;
}

if(jenis==='QRIS'){
nominal=document.getElementById('qrisNominal').value;
uraian=document.getElementById('qrisUraian').value;
}

if(jenis==='Pengeluaran'){
nominal=document.getElementById('pengeluaranNominal').value;
uraian=document.getElementById('pengeluaranUraian').value;
}

if(jenis==='Tabungan'){
nominal=document.getElementById('tabunganNominal').value;
uraian=document.getElementById('tabunganUraian').value;
}

transaksi.push({
waktu:new Date().toLocaleTimeString('id-ID'),
jenis:jenis,
uraian:uraian,
nominal:Number(nominal)
});

render();
}

function render(){
let totalTunai=0;
let totalQris=0;
let totalPengeluaran=0;
let totalTabungan=0;
let isi='';

transaksi.forEach(x=>{
if(x.jenis==='Tunai') totalTunai+=x.nominal;
if(x.jenis==='QRIS') totalQris+=x.nominal;
if(x.jenis==='Pengeluaran') totalPengeluaran+=x.nominal;
if(x.jenis==='Tabungan') totalTabungan+=x.nominal;

isi+=`<tr>
<td>${x.waktu}</td>
<td>${x.jenis}</td>
<td>${x.uraian}</td>
<td>Rp ${rupiah(x.nominal)}</td>
</tr>`;
});

const saldo=(totalTunai-totalPengeluaran-totalTabungan);

document.getElementById('tunai').innerHTML='Rp '+rupiah(totalTunai);
document.getElementById('qris').innerHTML='Rp '+rupiah(totalQris);
document.getElementById('pengeluaran').innerHTML='Rp '+rupiah(totalPengeluaran);
document.getElementById('tabungan').innerHTML='Rp '+rupiah(totalTabungan);
document.getElementById('saldo').innerHTML='Rp '+rupiah(saldo);
document.getElementById('history').innerHTML=isi;
}

function render(){
...
}

</script>

</body>
</html>
