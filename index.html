<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SB TUGU FINAL FIREBASE</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{background:#edf4ff;color:#1e293b}
.login-page{height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#2563eb,#1d4ed8);padding:20px}
.login-box{background:white;width:100%;max-width:430px;padding:35px;border-radius:28px;box-shadow:0 20px 50px rgba(0,0,0,.2)}
.logo{font-size:34px;font-weight:700;color:#2563eb;margin-bottom:8px}
.subtitle{color:#64748b;margin-bottom:20px}
input,select{width:100%;padding:14px;border:1px solid #cbd5e1;border-radius:14px;margin-top:12px;font-size:14px}
button{cursor:pointer}
.login-btn,.save-btn{width:100%;padding:14px;border:none;border-radius:14px;background:#2563eb;color:white;font-weight:700;margin-top:12px}
#mainApp{display:none;padding:18px}
.topbar{display:flex;justify-content:flex-end;margin-bottom:16px}
.saldo-box{background:white;padding:18px 24px;border-radius:22px;box-shadow:0 3px 10px rgba(0,0,0,.05);text-align:right}
.saldo-box small{color:#64748b}
.saldo-box h2{color:#16a34a;font-size:30px;margin-top:6px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:16px}
.card{background:white;padding:18px;border-radius:22px;box-shadow:0 3px 10px rgba(0,0,0,.05)}
.card small{color:#64748b}
.card h2{margin-top:8px;color:#2563eb}
.section{background:white;padding:20px;border-radius:24px;margin-bottom:16px;box-shadow:0 3px 10px rgba(0,0,0,.05)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px}
.formbox{background:#f8fbff;padding:18px;border-radius:20px;border:1px solid #dbeafe}
.formbox h3{margin-bottom:12px;color:#2563eb}
table{width:100%;border-collapse:collapse}
th,td{padding:12px;border-bottom:1px solid #e2e8f0;font-size:13px;text-align:left}
th{background:#eff6ff;color:#2563eb}
.action-btn{padding:6px 10px;border:none;border-radius:8px;color:white;font-size:12px}
.edit-btn{background:#f59e0b}
.delete-btn{background:#ef4444}
.hidden{display:none}
</style>
</head>
<body>

<div class="login-page" id="loginPage">
<div class="login-box">
<div class="logo">SB TUGU</div>
<div class="subtitle">Kasir Professional Firebase</div>
<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">
<button class="login-btn" onclick="login()">LOGIN</button>
</div>
</div>

<div id="mainApp">

<div class="topbar">
<button onclick="logout()" style="background:#ef4444;color:white;border:none;padding:12px 18px;border-radius:12px;font-weight:700;margin-right:12px;cursor:pointer;">Logout</button>
<div class="saldo-box">
<small>Saldo Uang Tunai</small>
<h2 id="saldo">Rp 0</h2>
</div>
</div>

<div class="cards">
<div class="card"><small>Total Tunai</small><h2 id="totalTunai">Rp 0</h2></div>
<div class="card"><small>Total QRIS</small><h2 id="totalQris">Rp 0</h2></div>
<div class="card"><small>Total Pengeluaran</small><h2 id="totalPengeluaran">Rp 0</h2></div>
<div class="card"><small>Total Tabungan</small><h2 id="totalTabungan">Rp 0</h2></div>
<div class="card"><small>Total Transaksi</small><h2 id="totalTransaksi">0</h2></div>
</div>

<div class="section hidden" id="dashboardKasirArea">
<h2 style="margin-bottom:14px">Dashboard Per Kasir</h2>
<div class="cards" id="dashboardKasir"></div>
</div>

<div class="section" id="inputArea">
<div class="grid">

<div class="formbox">
<h3>Penjualan Tunai</h3>
<input id="tunaiNominal" placeholder="Nominal">
<input id="tunaiUraian" placeholder="Uraian">
<button class="save-btn" onclick="simpan('Tunai')">Simpan</button>
</div>

<div class="formbox">
<h3>Penjualan QRIS</h3>
<input id="qrisNominal" placeholder="Nominal">
<input id="qrisUraian" placeholder="Uraian">
<button class="save-btn" onclick="simpan('QRIS')">Simpan</button>
</div>

<div class="formbox">
<h3>Pengeluaran Umum</h3>
<input id="pengeluaranNominal" placeholder="Nominal">
<input id="pengeluaranUraian" placeholder="Uraian">
<button class="save-btn" onclick="simpan('Pengeluaran')">Simpan</button>
</div>

<div class="formbox">
<h3>Pengeluaran Tabungan</h3>
<input id="tabunganNominal" placeholder="Nominal">
<input id="tabunganUraian" placeholder="Uraian">
<button class="save-btn" onclick="simpan('Tabungan')">Simpan</button>
</div>

</div>
</div>

<div class="section">

<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;align-items:end;">

<div>
<label>Tanggal Awal</label>
<input type="date" id="tglAwal">
</div>

<div>
<label>Tanggal Akhir</label>
<input type="date" id="tglAkhir">
</div>

<div>
<label>Kasir</label>
<select id="filterKasir">
<option value="">Semua Kasir</option>
<option value="kasir1">Kasir 1</option>
<option value="kasir2">Kasir 2</option>
<option value="kasir3">Kasir 3</option>
<option value="kasir4">Kasir 4</option>
</select>
</div>

<button class="save-btn" onclick="filterData()" style="width:auto;padding:14px 24px;">Tampilkan</button>
<button class="save-btn" onclick="downloadPDF()" style="width:auto;padding:14px 24px;background:#16a34a;">Download PDF</button>

</div>

<table>
<thead>
<tr>
<th>Waktu</th>
<th>Kasir</th>
<th>Jenis</th>
<th>Uraian</th>
<th>Nominal</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="history"></tbody>
</table>
</div>

</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getDatabase, ref, push, onValue, remove, update } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

const firebaseConfig={
apiKey:'AIzaSyAy2SdCWzkWfldozz0cBRL_ifP00IFb3vo',
authDomain:'sb-tugu-kasir.firebaseapp.com',
databaseURL:'https://sb-tugu-kasir-default-rtdb.asia-southeast1.firebasedatabase.app',
projectId:'sb-tugu-kasir',
storageBucket:'sb-tugu-kasir.firebasestorage.app',
messagingSenderId:'953508498389',
appId:'1:953508498389:web:81b5720e8420a04cdb8b5c'
};

const firebaseApp=initializeApp(firebaseConfig);
const db=getDatabase(firebaseApp);
const transaksiRef=ref(db,'transaksi');

let transaksi=[];
let transaksiFilter=[];
let userLogin='';

function rupiah(n){
return Number(n||0).toLocaleString('id-ID');
}

function formatInput(id){
document.getElementById(id).addEventListener('input',function(){
let value=this.value.replace(/[^0-9]/g,'');
this.value=value?Number(value).toLocaleString('id-ID'):'';
});
}

['tunaiNominal','qrisNominal','pengeluaranNominal','tabunganNominal'].forEach(formatInput);

window.login=function(){
let u=document.getElementById('username').value;
let p=document.getElementById('password').value;

if(['owner','kasir1','kasir2','kasir3','kasir4'].includes(u)&&p==='12345'){
userLogin=u;
document.getElementById('loginPage').style.display='none';
document.getElementById('mainApp').style.display='block';

if(u==='owner'){
document.getElementById('inputArea').classList.add('hidden');
document.getElementById('dashboardKasirArea').classList.remove('hidden');
}

render();
}else{
alert('Username atau password salah');
}
}

window.logout=function(){
location.reload();
}

window.simpan=function(jenis){
let nominal=0;
let uraian='';

if(jenis==='Tunai'){
nominal=tunaiNominal.value;
uraian=tunaiUraian.value;
tunaiNominal.value='';
tunaiUraian.value='';
}

if(jenis==='QRIS'){
nominal=qrisNominal.value;
uraian=qrisUraian.value;
qrisNominal.value='';
qrisUraian.value='';
}

if(jenis==='Pengeluaran'){
nominal=pengeluaranNominal.value;
uraian=pengeluaranUraian.value;
pengeluaranNominal.value='';
pengeluaranUraian.value='';
}

if(jenis==='Tabungan'){
nominal=tabunganNominal.value;
uraian=tabunganUraian.value;
tabunganNominal.value='';
tabunganUraian.value='';
}

nominal=Number(String(nominal).replace(/\./g,''));

push(transaksiRef,{
waktu:new Date().toISOString(),
kasir:userLogin,
jenis,
uraian,
nominal
});
}

onValue(transaksiRef,(snapshot)=>{
let data=snapshot.val()||{};
transaksi=[];

Object.keys(data).forEach(id=>{
transaksi.push({id,...data[id]});
});

render();
});

window.filterData=function(){
render();
}

window.ubahData=function(id){
let trx=transaksi.find(x=>x.id===id);
let baru=prompt('Nominal baru',trx.nominal);
if(baru){
update(ref(db,'transaksi/'+id),{nominal:Number(baru)});
}
}

window.hapusData=function(id){
remove(ref(db,'transaksi/'+id));
}

function render(){

let data=userLogin==='owner'
? transaksi
: transaksi.filter(x=>x.kasir===userLogin);

let tglAwal=document.getElementById('tglAwal')?.value;
let tglAkhir=document.getElementById('tglAkhir')?.value;
let filterKasir=document.getElementById('filterKasir')?.value;

if(filterKasir){
data=data.filter(x=>x.kasir===filterKasir);
}

if(tglAwal){
data=data.filter(x=>{
let t=new Date(x.waktu);
return t>=new Date(tglAwal);
});
}

if(tglAkhir){
data=data.filter(x=>{
let t=new Date(x.waktu);
let akhir=new Date(tglAkhir);
akhir.setHours(23,59,59,999);
return t<=akhir;
});
}

transaksiFilter=data;

let tunai=0,qris=0,pengeluaran=0,tabungan=0;
let isi='';

data.forEach(x=>{

if(x.jenis==='Tunai')tunai+=x.nominal;
if(x.jenis==='QRIS')qris+=x.nominal;
if(x.jenis==='Pengeluaran')pengeluaran+=x.nominal;
if(x.jenis==='Tabungan')tabungan+=x.nominal;

let aksi='-';

if(userLogin==='owner'){
aksi=`
<button class="action-btn edit-btn" onclick="ubahData('${x.id}')">Ubah</button>
<button class="action-btn delete-btn" onclick="hapusData('${x.id}')">Hapus</button>
`;
}

isi+=`<tr>
<td>${new Date(x.waktu).toLocaleString('id-ID')}</td>
<td>${x.kasir}</td>
<td>${x.jenis}</td>
<td>${x.uraian}</td>
<td>Rp ${rupiah(x.nominal)}</td>
<td>${aksi}</td>
</tr>`;
});


document.getElementById('totalTunai').innerHTML='Rp '+rupiah(tunai);
document.getElementById('totalQris').innerHTML='Rp '+rupiah(qris);
document.getElementById('totalPengeluaran').innerHTML='Rp '+rupiah(pengeluaran);
document.getElementById('totalTabungan').innerHTML='Rp '+rupiah(tabungan);
document.getElementById('totalTransaksi').innerHTML=data.length;
document.getElementById('saldo').innerHTML='Rp '+rupiah(tunai-pengeluaran-tabungan);
document.getElementById('history').innerHTML=isi;

renderDashboardKasir();
}

function renderDashboardKasir(){
if(userLogin!=='owner')return;

let html='';

['kasir1','kasir2','kasir3','kasir4'].forEach(kasir=>{
let dataKasir=transaksi.filter(x=>x.kasir===kasir);
let total=dataKasir.reduce((a,b)=>a+b.nominal,0);

html+=`<div class="card">
<small>${kasir.toUpperCase()}</small>
<h2>Rp ${rupiah(total)}</h2>
<div>${dataKasir.length} transaksi</div>
</div>`;
});


document.getElementById('dashboardKasir').innerHTML=html;
}

window.downloadPDF=function(){

const { jsPDF } = window.jspdf;
const doc = new jsPDF();

let rows=[];
let totalTunai=0;
let totalQris=0;
let totalPengeluaran=0;
let totalTabungan=0;

transaksiFilter.forEach((x,index)=>{

if(x.jenis==='Tunai') totalTunai+=x.nominal;
if(x.jenis==='QRIS') totalQris+=x.nominal;
if(x.jenis==='Pengeluaran') totalPengeluaran+=x.nominal;
if(x.jenis==='Tabungan') totalTabungan+=x.nominal;

rows.push([
index+1,
new Date(x.waktu).toLocaleString('id-ID'),
x.kasir,
x.jenis,
x.uraian,
'Rp '+rupiah(x.nominal)
]);
});

let saldo=totalTunai-totalPengeluaran-totalTabungan;

let tglAwal=document.getElementById('tglAwal').value || '-';
let tglAkhir=document.getElementById('tglAkhir').value || '-';
let kasir=document.getElementById('filterKasir').value || 'Semua';


doc.setFontSize(18);
doc.text('LAPORAN SB TUGU',14,18);


doc.setFontSize(11);
doc.text('Periode : '+tglAwal+' s/d '+tglAkhir,14,28);
doc.text('Kasir : '+kasir,14,35);


doc.autoTable({
startY:45,
head:[['No','Waktu','Kasir','Jenis','Uraian','Nominal']],
body:rows,
styles:{fontSize:9},
headStyles:{fillColor:[37,99,235]}
});

let finalY=doc.lastAutoTable.finalY+10;

doc.text('Total Tunai : Rp '+rupiah(totalTunai),14,finalY);
doc.text('Total QRIS : Rp '+rupiah(totalQris),14,finalY+7);
doc.text('Total Pengeluaran : Rp '+rupiah(totalPengeluaran),14,finalY+14);
doc.text('Total Tabungan : Rp '+rupiah(totalTabungan),14,finalY+21);
doc.text('Saldo Tunai : Rp '+rupiah(saldo),14,finalY+28);


doc.save('Laporan-SB-TUGU.pdf');
}

</script>

</body>
</html>
