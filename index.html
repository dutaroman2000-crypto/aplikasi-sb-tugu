<script>

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}

let saldo =
  parseInt(localStorage.getItem("saldo")) || 0;

let totalQris =
  parseInt(localStorage.getItem("totalQris")) || 0;

function simpanData() {

  localStorage.setItem("saldo", saldo);

  localStorage.setItem("totalQris", totalQris);

}

function login() {

  var username =
    document.getElementById("username").value;

  var password =
    document.getElementById("password").value;

  if (
    (username === "owner" && password === "12345") ||
    (username === "kasir1" && password === "12345") ||
    (username === "kasir2" && password === "12345") ||
    (username === "kasir3" && password === "12345") ||
    (username === "kasir4" && password === "12345")
  ) {

    document.getElementById("loginPage").style.display =
      "none";

    document.getElementById("dashboard").style.display =
      "block";

    document.getElementById("saldo").innerHTML =
      saldo;

    document.getElementById("totalQris").innerHTML =
      totalQris;

  } else {

    alert("Username atau Password salah");

  }

}

function logout() {

  document.getElementById("dashboard").style.display =
    "none";

  document.getElementById("loginPage").style.display =
    "block";

}

function tambahKasMasuk() {

  var nominal =
    parseInt(document.getElementById("masuk").value) || 0;

  saldo += nominal;

  document.getElementById("saldo").innerHTML =
    saldo;

  simpanData();

  alert("Kas Masuk berhasil");

  document.getElementById("masuk").value = "";

}

function tambahKasKeluar() {

  var nominal =
    parseInt(document.getElementById("keluar").value) || 0;

  saldo -= nominal;

  document.getElementById("saldo").innerHTML =
    saldo;

  simpanData();

  alert("Kas Keluar berhasil");

  document.getElementById("keluar").value = "";

}

function tambahQris() {

  var qris =
    parseInt(document.getElementById("qris").value) || 0;

  totalQris += qris;

  document.getElementById("totalQris").innerHTML =
    totalQris;

  simpanData();

  alert("QRIS berhasil disimpan");

  document.getElementById("qris").value = "";

}

function updateJam() {

  const sekarang = new Date();

  const hari = [
    "Minggu",
    "Senin",
    "Selasa",
    "Rabu",
    "Kamis",
    "Jumat",
    "Sabtu"
  ];

  const namaHari =
    hari[sekarang.getDay()];

  const tanggal =
    sekarang.toLocaleDateString("id-ID");

  const jam =
    sekarang.toLocaleTimeString("id-ID");

  document.getElementById("jamOtomatis").innerHTML =
    namaHari + ", " +
    tanggal + " - " +
    jam;

}

setInterval(updateJam, 1000);

</script>
