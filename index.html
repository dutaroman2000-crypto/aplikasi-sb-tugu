<h3>Tambah Kas Masuk</h3>

<input id="uraianMasuk"
       placeholder="Uraian Kas Masuk"
       style="
       width:100%;
       padding:12px;
       border-radius:8px;
       border:1px solid #ccc;
       margin-bottom:10px;
       ">

<input id="masuk"
       type="number"
       placeholder="Nominal Kas Masuk"
       style="
       width:100%;
       padding:12px;
       border-radius:8px;
       border:1px solid #ccc;
       ">

<button onclick="tambahKasMasuk()"
        style="
        margin-top:10px;
        padding:12px;
        width:100%;
        background:green;
        color:white;
        border:none;
        border-radius:10px;
        ">
  Tambah Kas Masuk
</button>

<hr>
