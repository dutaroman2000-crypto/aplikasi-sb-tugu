<style>

body{
  font-family:Arial;
  background:#f5f5f5;
  margin:0;
  padding:6px;
}

.card{
  background:white;
  border-radius:10px;
  padding:8px;
  margin-bottom:6px;
  box-shadow:0 1px 4px rgba(0,0,0,0.08);
}

.summary-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:6px;
  margin-bottom:6px;
}

.transaksi-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:6px;
}

.summary{
  border-left:4px solid orange;
}

.summary h4{
  margin:0;
  font-size:11px;
  color:#666;
}

.summary h2{
  margin:4px 0 0 0;
  font-size:16px;
}

input{
  width:100%;
  padding:7px;
  margin-top:5px;
  border-radius:7px;
  border:1px solid #ccc;
  box-sizing:border-box;
  font-size:12px;
}

button{
  width:100%;
  padding:8px;
  margin-top:6px;
  border:none;
  border-radius:7px;
  color:white;
  font-weight:bold;
  cursor:pointer;
  font-size:12px;
}

h1,h2,h3,h4{
  margin:3px 0;
}

.btn-orange{
  background:orange;
}

.btn-green{
  background:green;
}

.btn-blue{
  background:#1976d2;
}

.btn-red{
  background:red;
}

.btn-purple{
  background:purple;
}

.btn-black{
  background:black;
}

.btn-gray{
  background:gray;
}

table{
  width:100%;
  border-collapse:collapse;
  background:white;
}

th, td{
  border:1px solid #ddd;
  padding:4px;
  font-size:10px;
}

th{
  background:orange;
  color:white;
}

@media(max-width:700px){

  .summary-grid{
    grid-template-columns:1fr 1fr;
  }

  .transaksi-grid{
    grid-template-columns:1fr 1fr;
  }

}

</style>
